services:
  - type: web
    name: ed-triage-ai
    env: python
    plan: free
    buildCommand: pip install -r ed_triage_ai/requirements.txt
    startCommand: streamlit run ed_triage_ai/app/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
